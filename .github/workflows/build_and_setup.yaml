name: Build and Push Storefront Image to ECR

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        required: false
        type: string
        default: us-west-2
      role-to-assume:
        description: "ARN of the IAM role to assume via OIDC (output of iam-oidc-provider Terraform module)"
        required: true
        type: string
      ecr-repository-policy-json:
        description: "ECR repository policy JSON to apply on first pipeline run"
        required: true
        type: string
      platforms:
        description: "Docker build platforms. Comma-separated list. Supported: linux/amd64, linux/arm64. Each requested arch is built on its native GitHub-hosted runner (no QEMU); a final manifest-list tag (no arch suffix) is then created to point at the per-arch images."
        required: false
        type: string
        default: linux/amd64,linux/arm64
      cache-mode:
        description: "BuildKit GHA cache export mode: 'max' exports all intermediate layers, 'min' exports only the final image layer"
        required: false
        type: string
        default: max
      extra-cache-from:
        description: "Additional cache-from source passed to BuildKit (e.g. type=registry,ref=<image>). Appended after the default GHA cache source."
        required: false
        type: string
        default: ""
      pre-built-assets-artifact:
        description: "Name of a GHA artifact containing pre-built static assets (e.g. _fresh/) to include in the Docker build context before building."
        required: false
        type: string
        default: ""
      pre-built-assets-path:
        description: "Where to extract `pre-built-assets-artifact` inside the workspace. Default `_fresh/` matches legacy callers shipping only the Fresh bundle. Set to `.` when the artifact contains a full pre-built workspace so the contents land at repo root."
        required: false
        type: string
        default: "_fresh/"
      build-args:
        description: "Multi-line build args forwarded to docker/build-push-action (one KEY=VALUE per line). Useful to pass NPM_CONFIG_REGISTRY, feature flags, etc."
        required: false
        type: string
        default: ""
      codeartifact-domain:
        description: "AWS CodeArtifact domain. When set, the workflow resolves a 1h npm registry endpoint + auth token via OIDC. The endpoint is passed as NPM_CONFIG_REGISTRY build-arg; the token is passed via a BuildKit secret-file (id=npmrc), so the Dockerfile must mount it: `RUN --mount=type=secret,id=npmrc,target=/root/.npmrc ...`. Token never appears in build-args, image layers, or BuildKit failure echoes."
        required: false
        type: string
        default: ""
      codeartifact-repository:
        description: "AWS CodeArtifact repository name (the npm-format mirror). Required when codeartifact-domain is set."
        required: false
        type: string
        default: ""
      ecr-repository:
        description: "ECR repository name. When set, skips reading DECO_SITE_NAME from the values file."
        required: false
        type: string
        default: ""
      values-repo:
        description: "External repository to update with the new image tag (e.g. decocms/deco-apps-cd). When empty, updates the calling repository."
        required: false
        type: string
        default: ""
      values-path:
        description: "Path to the values file within the target repository."
        required: false
        type: string
        default: deploy/values-custom.yaml
      values-repo-ref:
        description: "Branch of the external repository to update."
        required: false
        type: string
        default: main
    secrets:
      app-id:
        description: "GitHub App ID for generating tokens to push to external repositories."
        required: false
      app-private-key:
        description: "GitHub App private key for generating tokens to push to external repositories."
        required: false

env:
  AWS_REGION: ${{ inputs.aws-region }}

jobs:
  # ---------------------------------------------------------------------------
  # Prep: parse platforms input into a build matrix and resolve repo-level
  # metadata once, so the matrix jobs don't duplicate work or diverge.
  # ---------------------------------------------------------------------------
  prep:
    name: Prep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      ecr-repo: ${{ steps.ecr-repo.outputs.name }}
      short-sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get ECR repository name
        id: ecr-repo
        run: |
          if [ -n "${{ inputs.ecr-repository }}" ]; then
            echo "name=${{ inputs.ecr-repository }}" >> $GITHUB_OUTPUT
            echo "ECR repository (from input): ${{ inputs.ecr-repository }}"
          else
            VALUES_FILE="deploy/values-custom.yaml"
            if [ ! -f "$VALUES_FILE" ]; then
              echo "::error::File ${VALUES_FILE} not found"
              exit 1
            fi
            ECR_REPO=$(awk '/DECO_SITE_NAME/{getline; if ($1 ~ /value:/) {gsub(/"/,"",$2); print $2; exit}}' "$VALUES_FILE")
            if [ -z "$ECR_REPO" ]; then
              echo "::error::DECO_SITE_NAME not found in ${VALUES_FILE}"
              exit 1
            fi
            echo "name=${ECR_REPO}" >> $GITHUB_OUTPUT
            echo "ECR repository (from values): ${ECR_REPO}"
          fi

      - name: Set metadata
        id: meta
        run: |
          echo "full_sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build matrix from platforms input
        id: matrix
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -eu
          # Map each supported platform to its native GitHub-hosted runner so
          # docker buildx never has to invoke QEMU. Order is deterministic
          # (amd64 first) so logs and dashboards read consistently.
          INCLUDES=()
          if echo ",$PLATFORMS," | grep -q ',linux/amd64,'; then
            INCLUDES+=('{"arch":"amd64","platform":"linux/amd64","runner":"ubuntu-latest"}')
          fi
          if echo ",$PLATFORMS," | grep -q ',linux/arm64,'; then
            INCLUDES+=('{"arch":"arm64","platform":"linux/arm64","runner":"ubuntu-22.04-arm"}')
          fi
          if [ ${#INCLUDES[@]} -eq 0 ]; then
            echo "::error::No supported platform in '$PLATFORMS' (expected linux/amd64 and/or linux/arm64)"
            exit 1
          fi
          JOINED=$(IFS=,; echo "${INCLUDES[*]}")
          echo "matrix={\"include\":[${JOINED}]}" >> $GITHUB_OUTPUT
          echo "Matrix: {\"include\":[${JOINED}]}"

  # ---------------------------------------------------------------------------
  # Build: one native job per requested architecture. Each pushes an
  # arch-suffixed tag (`<image>:<sha>-amd64`, `<image>:<sha>-arm64`); the
  # manifest-list (the tag callers actually deploy) is assembled in the
  # `build-and-push` job below from these per-arch tags.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    needs: [prep]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download pre-built assets
        if: inputs.pre-built-assets-artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.pre-built-assets-artifact }}
          path: ${{ inputs.pre-built-assets-path }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        # Idempotent — safe to run in every matrix job. The first concurrent
        # run wins the create; the others see "already exists" and move on.
        env:
          ECR_REPOSITORY_POLICY_JSON: ${{ inputs.ecr-repository-policy-json }}
        run: |
          if aws ecr describe-repositories --repository-names ${{ needs.prep.outputs.ecr-repo }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Repository ${{ needs.prep.outputs.ecr-repo }} already exists"
          else
            echo "Creating ECR repository ${{ needs.prep.outputs.ecr-repo }} (first pipeline run)"
            aws ecr create-repository --repository-name ${{ needs.prep.outputs.ecr-repo }} --region ${{ env.AWS_REGION }}
            if [ -n "$ECR_REPOSITORY_POLICY_JSON" ]; then
              echo "$ECR_REPOSITORY_POLICY_JSON" > /tmp/ecr-policy.json
              aws ecr set-repository-policy \
                --repository-name ${{ needs.prep.outputs.ecr-repo }} \
                --policy-text file:///tmp/ecr-policy.json \
                --region ${{ env.AWS_REGION }}
              echo "Repository policy applied."
              rm -f /tmp/ecr-policy.json
            fi
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve CodeArtifact registry and write npmrc secret
        id: codeartifact
        if: inputs.codeartifact-domain != ''
        run: |
          set -eu
          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain "${{ inputs.codeartifact-domain }}" \
            --repository "${{ inputs.codeartifact-repository }}" \
            --format npm \
            --query repositoryEndpoint --output text)
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain "${{ inputs.codeartifact-domain }}" \
            --duration-seconds 3600 \
            --query authorizationToken --output text)
          HOST_PATH="${ENDPOINT#https://}"
          HOST_PATH="${HOST_PATH%/}"
          NPMRC_FILE="${RUNNER_TEMP}/codeartifact-npmrc"
          {
            echo "registry=${ENDPOINT}"
            echo "//${HOST_PATH}/:_authToken=${TOKEN}"
            echo "always-auth=true"
          } > "$NPMRC_FILE"
          chmod 600 "$NPMRC_FILE"
          echo "registry=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "npmrc-file=$NPMRC_FILE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ needs.prep.outputs.ecr-repo }}:${{ needs.prep.outputs.short-sha }}-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          build-args: |
            ${{ inputs.build-args }}
            ${{ steps.codeartifact.outputs.registry && format('NPM_CONFIG_REGISTRY={0}', steps.codeartifact.outputs.registry) || '' }}
          secret-files: |
            ${{ steps.codeartifact.outputs.npmrc-file && format('npmrc={0}', steps.codeartifact.outputs.npmrc-file) || '' }}
          # Registry-backed cache: BuildKit pushes the deps stage's
          # layers to a fixed cache tag in the same ECR repo. Subsequent
          # builds (any branch) pull it back and reuse the deno install +
          # deno cache layers without re-executing them. Tag is fixed
          # per arch so the cache rotates in place; the previous manifest
          # becomes untagged and the ECR lifecycle policy expires it.
          # mode=max exports every intermediate layer (not just the
          # final image). image-manifest=true forces the OCI image
          # manifest format ECR accepts (the BuildKit default index
          # format is rejected by ECR).
          cache-from: |
            type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ needs.prep.outputs.ecr-repo }}:cache-${{ matrix.arch }}
            ${{ inputs.extra-cache-from }}
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ needs.prep.outputs.ecr-repo }}:cache-${{ matrix.arch }},mode=${{ inputs.cache-mode }},image-manifest=true,oci-mediatypes=true

      - name: Clean up npmrc secret file
        if: always() && steps.codeartifact.outputs.npmrc-file != ''
        run: rm -f "${{ steps.codeartifact.outputs.npmrc-file }}"

  # ---------------------------------------------------------------------------
  # Manifest: stitch the per-arch tags into the manifest-list that callers
  # actually deploy (`<image>:<sha>`, no arch suffix). Job name and outputs
  # are kept stable as `build-and-push` for back-compat with downstream
  # `needs:` references (e.g. update-values).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push to ECR
    needs: [prep, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      short-sha: ${{ needs.prep.outputs.short-sha }}
      ecr-image: ${{ steps.login-ecr.outputs.registry }}/${{ needs.prep.outputs.ecr-repo }}:${{ needs.prep.outputs.short-sha }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest list
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ needs.prep.outputs.ecr-repo }}
          SHA: ${{ needs.prep.outputs.short-sha }}
          MATRIX_JSON: ${{ needs.prep.outputs.matrix }}
        run: |
          set -eu
          SOURCES=$(echo "$MATRIX_JSON" | jq -r '.include[].arch' | while read arch; do
            echo "${REGISTRY}/${REPO}:${SHA}-${arch}"
          done | tr '\n' ' ')
          echo "Merging into ${REGISTRY}/${REPO}:${SHA} from: $SOURCES"
          docker buildx imagetools create \
            --tag "${REGISTRY}/${REPO}:${SHA}" \
            $SOURCES

      - name: Output summary
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ needs.prep.outputs.ecr-repo }}
          SHA: ${{ needs.prep.outputs.short-sha }}
        run: |
          {
            echo "## Release commit ${SHA}"
            echo ""
            echo "**Docker image (ECR)**"
            echo ""
            echo '```'
            echo "${REGISTRY}/${REPO}:${SHA}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Update values file with the new image tag.
  # Runs as a separate job so it can be re-run independently on failure.
  # ---------------------------------------------------------------------------
  update-values:
    name: Update Values
    needs: [build-and-push]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── External repo: update via GitHub API (no clone) ────────────
      - name: Parse values repo owner and name
        if: inputs.values-repo != ''
        id: values-repo-parts
        run: |
          OWNER=$(echo "${{ inputs.values-repo }}" | cut -d'/' -f1)
          REPO=$(echo "${{ inputs.values-repo }}" | cut -d'/' -f2)
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        if: inputs.values-repo != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ steps.values-repo-parts.outputs.owner }}
          repositories: ${{ steps.values-repo-parts.outputs.repo }}

      - name: Update values in external repository
        if: inputs.values-repo != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VALUES_REPO: ${{ inputs.values-repo }}
          VALUES_PATH: ${{ inputs.values-path }}
          VALUES_REF: ${{ inputs.values-repo-ref }}
          SHORT_SHA: ${{ needs.build-and-push.outputs.short-sha }}
        run: |
          MAX_RETRIES=3
          RETRY=0

          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "Fetching ${VALUES_PATH} from ${VALUES_REPO} (ref: ${VALUES_REF})..."

            # GET file content + SHA for optimistic locking
            RESPONSE=$(gh api "repos/${VALUES_REPO}/contents/${VALUES_PATH}?ref=${VALUES_REF}" 2>&1)
            if [ $? -ne 0 ]; then
              echo "::error::Failed to fetch file: ${RESPONSE}"
              exit 1
            fi

            FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
            CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)

            # Apply sed replacements
            UPDATED=$(echo "$CONTENT" | \
              sed "s/\(tag: \"\)[a-f0-9]\{7\}\(\"*\)/\1${SHORT_SHA}\2/" | \
              sed "s/\(deploymentId=\)[a-f0-9]\{7\}/\1${SHORT_SHA}/" | \
              sed "/name: DENO_DEPLOYMENT_ID/{n;s/value:.*/value: ${SHORT_SHA}/;}")

            # Validate substitutions
            echo "$UPDATED" | grep -q "tag: \"${SHORT_SHA}\"" || { echo "::error::Failed to update image tag"; exit 1; }
            echo "$UPDATED" | grep -q "deploymentId=${SHORT_SHA}" || { echo "::error::Failed to update deploymentId"; exit 1; }
            echo "$UPDATED" | grep -A1 "name: DENO_DEPLOYMENT_ID" | grep -q "value: ${SHORT_SHA}" || { echo "::error::Failed to update DENO_DEPLOYMENT_ID"; exit 1; }

            # Base64 encode for API
            ENCODED=$(echo "$UPDATED" | base64 -w 0)

            # PUT updated file with SHA for optimistic locking
            HTTP_CODE=$(gh api "repos/${VALUES_REPO}/contents/${VALUES_PATH}" \
              --method PUT \
              --field message="chore: update ${VALUES_PATH##*/} deployment to ${SHORT_SHA}" \
              --field content="${ENCODED}" \
              --field sha="${FILE_SHA}" \
              --field branch="${VALUES_REF}" \
              2>&1) && break

            # Check for conflict (another build updated the same file)
            if echo "$HTTP_CODE" | grep -q "409"; then
              RETRY=$((RETRY + 1))
              echo "Conflict detected (SHA changed). Retry ${RETRY}/${MAX_RETRIES}..."
              sleep 2
              continue
            else
              echo "::error::Failed to update file: ${HTTP_CODE}"
              exit 1
            fi
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "::error::Max retries reached. Could not update ${VALUES_PATH}."
            exit 1
          fi

          echo "Successfully updated ${VALUES_PATH} in ${VALUES_REPO} with SHA ${SHORT_SHA}"

      # ── Local repo: update file, commit, push ──────────────────────
      - name: Checkout repository
        if: inputs.values-repo == ''
        uses: actions/checkout@v4

      - name: Update local values file
        if: inputs.values-repo == ''
        run: |
          VALUES_FILE="${{ inputs.values-path }}"
          SHORT_SHA="${{ needs.build-and-push.outputs.short-sha }}"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::File ${VALUES_FILE} not found to update tag/deploymentId"
            exit 1
          fi

          echo "Updating ${VALUES_FILE} with short SHA ${SHORT_SHA}..."

          sed -i "s/\(tag: \"\)[a-f0-9]\{7\}\(\"*\)/\1${SHORT_SHA}\2/" "$VALUES_FILE"
          sed -i "s/\(deploymentId=\)[a-f0-9]\{7\}/\1${SHORT_SHA}/" "$VALUES_FILE"
          sed -i "/name: DENO_DEPLOYMENT_ID/{n;s/value:.*/value: ${SHORT_SHA}/;}" "$VALUES_FILE"

          echo "Updated content:"
          grep -E 'tag: "|deploymentId=|DENO_DEPLOYMENT_ID' -n "$VALUES_FILE" || true

          grep -q "tag: \"${SHORT_SHA}\"" "$VALUES_FILE" || { echo "::error::Failed to update image tag"; exit 1; }
          grep -q "deploymentId=${SHORT_SHA}" "$VALUES_FILE" || { echo "::error::Failed to update deploymentId"; exit 1; }
          grep -A1 "name: DENO_DEPLOYMENT_ID" "$VALUES_FILE" | grep -q "value: ${SHORT_SHA}" || { echo "::error::Failed to update DENO_DEPLOYMENT_ID"; exit 1; }

      - name: Commit and push local changes
        if: inputs.values-repo == ''
        run: |
          if git diff --quiet ${{ inputs.values-path }}; then
            echo "No changes in ${{ inputs.values-path }}; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ${{ inputs.values-path }}
          git commit -m "chore: update deployment id to ${{ needs.build-and-push.outputs.short-sha }}"
          git push

      - name: Output summary
        run: |
          SHORT_SHA="${{ needs.build-and-push.outputs.short-sha }}"
          if [ -n "${{ inputs.values-repo }}" ]; then
            echo "**Values updated in** \`${{ inputs.values-repo }}\` at \`${{ inputs.values-path }}\` → \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Values updated in** \`${{ inputs.values-path }}\` → \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          fi
