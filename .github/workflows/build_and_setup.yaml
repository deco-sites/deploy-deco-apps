name: Build and Push Storefront Image to ECR

on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        required: false
        type: string
        default: us-west-2
      aws-account-id:
        description: "AWS account ID for ECR login"
        required: true
        type: string
    secrets:
      ECR_CI_AWS_ACCESS_KEY_ID:
        required: true
      ECR_CI_AWS_SECRET_ACCESS_KEY:
        required: true
      ECR_REPOSITORY_POLICY_JSON:
        required: true

env:
  AWS_REGION: ${{ inputs.aws-region }}

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get ECR repository name from values file
        id: ecr-repo
        run: |
          VALUES_FILE="deploy/values-custom.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Arquivo ${VALUES_FILE} não encontrado"
            exit 1
          fi

          ECR_REPO=$(awk '/DECO_SITE_NAME/{getline; if ($1 ~ /value:/) {gsub(/"/,"",$2); print $2; exit}}' "$VALUES_FILE")

          if [ -z "$ECR_REPO" ]; then
            echo "::error::DECO_SITE_NAME não encontrado em ${VALUES_FILE}"
            exit 1
          fi

          echo "name=${ECR_REPO}" >> $GITHUB_OUTPUT
          echo "ECR repository: ${ECR_REPO}"

      - name: Set metadata
        id: meta
        run: |
          echo "full_sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (Access Keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECR_CI_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_CI_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY_POLICY_JSON: ${{ secrets.ECR_REPOSITORY_POLICY_JSON }}
        run: |
          if aws ecr describe-repositories --repository-names ${{ steps.ecr-repo.outputs.name }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Repository ${{ steps.ecr-repo.outputs.name }} already exists"
          else
            echo "Creating ECR repository ${{ steps.ecr-repo.outputs.name }} (first pipeline run)"
            aws ecr create-repository --repository-name ${{ steps.ecr-repo.outputs.name }} --region ${{ env.AWS_REGION }}
            if [ -n "$ECR_REPOSITORY_POLICY_JSON" ]; then
              echo "$ECR_REPOSITORY_POLICY_JSON" > /tmp/ecr-policy.json
              aws ecr set-repository-policy \
                --repository-name ${{ steps.ecr-repo.outputs.name }} \
                --policy-text file:///tmp/ecr-policy.json \
                --region ${{ env.AWS_REGION }}
              echo "Repository policy applied."
              rm -f /tmp/ecr-policy.json
            fi
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ inputs.aws-account-id }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ steps.ecr-repo.outputs.name }}:${{ steps.meta.outputs.short_sha }}
          build-args: |
            GIT_REVISION=${{ steps.meta.outputs.full_sha }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false

      - name: Output summary
        run: |
          echo "## Release commit ${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Imagem Docker (ECR)**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.login-ecr.outputs.registry }}/${{ steps.ecr-repo.outputs.name }}:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
